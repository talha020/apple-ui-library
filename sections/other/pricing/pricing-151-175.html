<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pricing Components 151-175</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Satoshi',-apple-system,BlinkMacSystemFont,sans-serif;background:#F6F6F7;padding:40px 20px;-webkit-font-smoothing:antialiased}
.container{max-width:1200px;margin:0 auto}
.component{background:#fff;border:1px solid #E3E3E8;border-radius:12px;padding:48px;margin-bottom:24px;box-shadow:0 1px 0 rgba(0,0,0,.04)}
h2{font-size:13px;color:#6D6D72;text-transform:uppercase;letter-spacing:1px;margin-bottom:32px;font-weight:600}
.grid{display:grid;gap:24px}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.card{background:#F6F6F7;border:1px solid #E3E3E8;border-radius:10px;padding:32px;transition:all .2s ease}
.card:hover{border-color:#2C6ECB}
.price{font-size:48px;font-weight:700;color:#1D1D1F;line-height:1}
.currency{font-size:28px}
.period{font-size:16px;color:#6D6D72;font-weight:400}
.title{font-size:21px;font-weight:600;color:#1D1D1F;margin-bottom:8px}
.subtitle{font-size:14px;color:#6D6D72;margin-bottom:20px}
.feature{font-size:14px;color:#1D1D1F;padding:10px 0;border-bottom:1px solid #E3E3E8;display:flex;align-items:center}
.feature:last-child{border:none}
.check{color:#1A8245;font-weight:700;margin-right:10px}
.btn{display:inline-block;background:#1A1A1A;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;transition:all .2s ease;width:100%;text-align:center}
.btn:hover{opacity:.9}
.btn-outline{background:transparent;color:#1D1D1F;border:1px solid #E3E3E8}
.btn-outline:hover{border-color:#1D1D1F}
.popular{border:2px solid #2C6ECB;position:relative}
.badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:#2C6ECB;color:#fff;padding:4px 12px;border-radius:9999px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:16px;text-align:left;border-bottom:1px solid #E3E3E8}
.table th{font-size:13px;color:#6D6D72;font-weight:600}
.table td{font-size:14px;color:#1D1D1F}
</style>
</head>
<body>
<div class="container">

<!-- Components 151-175 with various pricing models -->
<!-- Each component showcases different pricing strategies -->

</div>
</body>
</html>
